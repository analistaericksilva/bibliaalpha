name: FTP Debug Deploy
    on:
      workflow_dispatch:

    jobs:
      ftp-debug:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - uses: actions/setup-node@v4
            with:
              node-version: 20
              cache: npm

          - name: Install dependencies
            run: npm ci

          - name: Build
            run: npm run build
            env:
              GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
              VITE_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

          - name: Prepare dist
            run: |
              cp public/.htaccess dist/.htaccess || true
              cp public/sw.js dist/sw.js || true
              echo "=== Arquivos em dist/ ==="
              ls -la dist/
              echo "=== sw.js primeiras linhas ==="
              head -5 dist/sw.js

          - name: FTP Debug e Deploy
            env:
              FTP_SERVER: ${{ secrets.FTP_SERVER }}
              FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
              FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
            run: python3 scripts/ftp_debug_deploy.py
    