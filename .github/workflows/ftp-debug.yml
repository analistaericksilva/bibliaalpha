name: FTP Debug
    on:
      workflow_dispatch:

    jobs:
      ftp-debug:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - uses: actions/setup-node@v4
            with:
              node-version: 20
              cache: npm

          - name: Install deps
            run: npm ci

          - name: Build
            run: npm run build
            env:
              GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
              VITE_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

          - name: Prepare dist
            run: |
              cp public/.htaccess dist/.htaccess || true
              cp public/sw.js dist/sw.js || true
              echo "Total arquivos dist:"
              find dist -type f | wc -l

          - name: FTP Debug + Deploy
            env:
              FTP_SERVER: ${{ secrets.FTP_SERVER }}
              FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
              FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
            run: |
              echo "Server: $FTP_SERVER"
              echo "User: ${FTP_USERNAME:0:6}***"
              python3 << 'PYEOF'
    import ftplib, os, sys, pathlib, time

    SERVER = os.environ['FTP_SERVER']
    USER = os.environ['FTP_USERNAME']
    PASS = os.environ['FTP_PASSWORD']

    def connect():
        ftp = ftplib.FTP()
        ftp.connect(SERVER, 21, timeout=60)
        ftp.login(USER, PASS)
        ftp.set_pasv(True)
        return ftp

    print(f"=== Conectando em {SERVER} ===")
    try:
        ftp = connect()
        print("OK:", ftp.getwelcome()[:80])
        print("PWD:", ftp.pwd())
        print("\n=== Listagem raiz ===")
        ftp.retrlines('LIST')
    except Exception as e:
        print(f"ERRO conexao: {e}")
        sys.exit(1)

    # Descobrir diretorio correto
    candidates = ['public_html', 'bibliaalpha.stuiologos.com.br', 'httpdocs', 'www', '/']
    target_dir = None
    for candidate in candidates:
        try:
            ftp.cwd('/')
            ftp.cwd(candidate)
            print(f"\n=== Encontrado: {candidate} ===")
            ftp.retrlines('LIST')
            target_dir = candidate
            break
        except:
            print(f"  nao existe: {candidate}")

    if not target_dir:
        print("ERRO: Nenhum diretorio encontrado!")
        sys.exit(1)

    print(f"\n=== Deploy para: {target_dir} ===")
    ftp.cwd('/')
    ftp.cwd(target_dir)

    local = pathlib.Path('dist')
    all_files = sorted(f for f in local.rglob('*') if f.is_file())
    print(f"Enviando {len(all_files)} arquivos...")

    errors = []
    uploaded = 0
    for f in all_files:
        rel = str(f.relative_to(local)).replace(os.sep, '/')
        remote = rel

        # Cria subpastas
        parts = rel.split('/')
        if len(parts) > 1:
            subdir = '/'.join(parts[:-1])
            try:
                ftp.cwd('/')
                ftp.cwd(target_dir)
                for part in subdir.split('/'):
                    try:
                        ftp.cwd(part)
                    except:
                        ftp.mkd(part)
                        ftp.cwd(part)
            except Exception as e:
                print(f"  Erro criando pasta {subdir}: {e}")

        ftp.cwd('/')
        ftp.cwd(target_dir)
        try:
            with open(str(f), 'rb') as fp:
                ftp.storbinary(f'STOR {parts[-1]}', fp)
            uploaded += 1
            if uploaded % 10 == 0 or f.name in ('index.html', 'sw.js', '.htaccess'):
                print(f"  [{uploaded}] {rel}")
        except Exception as e:
            errors.append((rel, str(e)))
            print(f"  ERRO {rel}: {e}")
            try:
                ftp.quit()
            except:
                pass
            ftp = connect()

    ftp.quit()
    print(f"\n=== RESULTADO ===")
    print(f"Enviados: {uploaded}/{len(all_files)}")
    print(f"Erros: {len(errors)}")
    for r, e in errors:
        print(f"  {r}: {e}")
    if errors:
        sys.exit(1)
    print("Deploy FTP concluido!")
    PYEOF
    