name: Build and Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENTINELA_AI_489015 }}
          channelId: live
          projectId: sentinela-ai-489015

      - name: Deploy Firestore Rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENTINELA_AI_489015 }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          pip install google-auth requests --break-system-packages -q
          python3 - << 'PYEOF'
import json, sys, requests
import google.auth.transport.requests
from google.oauth2 import service_account

with open('/tmp/sa.json') as f:
    sa = json.load(f)

creds = service_account.Credentials.from_service_account_info(
    sa, scopes=[
        'https://www.googleapis.com/auth/cloud-platform',
        'https://www.googleapis.com/auth/firebase'
    ])
creds.refresh(google.auth.transport.requests.Request())
token = creds.token

project_id = 'sentinela-ai-489015'
db_id = 'ai-studio-d00d75cd-ea9b-4bf1-9db1-7ac14eff586f'
headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}

with open('firestore.rules') as f:
    rules = f.read()

# 1. Create new ruleset
r = requests.post(
    f'https://firebaserules.googleapis.com/v1/projects/{project_id}/rulesets',
    json={"source": {"files": [{"content": rules, "name": "firestore.rules"}]}},
    headers=headers
)
print(f'Create ruleset: {r.status_code}')
if not r.ok:
    print(r.text)
    sys.exit(1)

ruleset = r.json()['name']
print(f'Ruleset: {ruleset}')

# 2. Update release for named database
release_name = f'projects/{project_id}/releases/cloud.firestore/{db_id}'
payload = {"release": {"name": release_name, "rulesetName": ruleset}}

r2 = requests.patch(
    f'https://firebaserules.googleapis.com/v1/{release_name}',
    json=payload, headers=headers,
    params={'updateMask': 'rulesetName'}
)
print(f'Patch release: {r2.status_code}')
if r2.status_code == 404:
    r2 = requests.post(
        f'https://firebaserules.googleapis.com/v1/projects/{project_id}/releases',
        json=payload, headers=headers
    )
    print(f'Create release: {r2.status_code}')
if not r2.ok:
    print(r2.text)
    sys.exit(1)

print('Firestore rules deployed successfully!')
PYEOF
