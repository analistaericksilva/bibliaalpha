name: Firebase Add Custom Domain

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-domain.yml'
      - 'scripts/add_firebase_domain.py'

jobs:
  add-domain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: pip install google-auth requests --break-system-packages -q

      - name: Add bibliaalpha.org to Firebase Hosting
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENTINELA_AI_489015 }}
        run: python3 scripts/add_firebase_domain.py
