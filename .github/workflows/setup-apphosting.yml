name: Setup Firebase App Hosting
on:
  workflow_dispatch:

jobs:
  setup-apphosting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable App Hosting API and grant IAM
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENTINELA_AI_489015 }}
        run: |
          pip install google-auth requests -q
          echo "$SA_JSON" > /tmp/sa.json
          python3 scripts/setup_apphosting.py
