name: FTP Debug Deploy
    on:
      workflow_dispatch:

    jobs:
      ftp-debug:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - uses: actions/setup-node@v4
            with:
              node-version: 20
              cache: npm

          - name: Install dependencies
            run: npm ci

          - name: Build
            run: npm run build
            env:
              GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
              VITE_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

          - name: Prepare dist
            run: |
              cp public/.htaccess dist/.htaccess || true
              cp public/sw.js dist/sw.js || true
              echo "=== Arquivos em dist/ ==="
              ls -la dist/
              echo "=== sw.js head ==="
              head -5 dist/sw.js
              echo "=== main.tsx sw registration ==="
              grep -n 'serviceWorker' src/main.tsx || echo "nao encontrado"

          - name: FTP Deploy com log detalhado
            env:
              FTP_SERVER: ${{ secrets.FTP_SERVER }}
              FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
              FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
            run: |
              echo "FTP_SERVER=$FTP_SERVER"
              echo "FTP_USERNAME=${FTP_USERNAME:0:5}***"
              python3 -c "
    import ftplib, os, sys, time, pathlib

    FTP_SERVER = os.environ['FTP_SERVER']
    FTP_USER = os.environ['FTP_USERNAME']
    FTP_PASS = os.environ['FTP_PASSWORD']

    print(f'Conectando em {FTP_SERVER}:21...')
    try:
        ftp = ftplib.FTP()
        ftp.connect(FTP_SERVER, 21, timeout=30)
        print('Conexao OK:', ftp.getwelcome()[:100])
        ftp.login(FTP_USER, FTP_PASS)
        ftp.set_pasv(True)
        print('Login OK')
        print('CWD inicial:', ftp.pwd())
        print('Listagem raiz:')
        ftp.retrlines('LIST')
    
        # Tenta entrar em public_html
        try:
            ftp.cwd('public_html')
            print('Entrou em public_html. CWD:', ftp.pwd())
            print('Listagem public_html:')
            ftp.retrlines('LIST')
        except Exception as e:
            print(f'NAO encontrou public_html: {e}')
            print('Tentando bibliaalpha...')
            try:
                ftp.cwd('/')
                ftp.cwd('bibliaalpha.stuiologos.com.br')
                print('Entrou em bibliaalpha.stuiologos.com.br. CWD:', ftp.pwd())
                ftp.retrlines('LIST')
            except Exception as e2:
                print(f'Erro: {e2}')
    
        ftp.quit()
    except Exception as e:
        print(f'ERRO CRITICO: {e}')
        import traceback
        traceback.print_exc()
        sys.exit(1)
    "
    