<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#1e293b"/>
  <!-- Amber ring border -->
  <rect x="28" y="28" width="456" height="456" rx="88" fill="none" stroke="#f59e0b" stroke-width="14"/>
  <!-- Cross top center -->
  <rect x="247" y="68" width="18" height="72" rx="5" fill="#f59e0b"/>
  <rect x="220" y="88" width="72" height="18" rx="5" fill="#f59e0b"/>
  <!-- Greek alpha symbol -->
  <text x="256" y="360"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="260"
    font-weight="bold"
    fill="#f59e0b"
    text-anchor="middle"
    dominant-baseline="auto">α</text>
  <!-- Subtle bottom text -->
  <text x="256" y="468"
    font-family="Arial, sans-serif"
    font-size="38"
    font-weight="600"
    fill="#94a3b8"
    text-anchor="middle"
    letter-spacing="6">BÍBLIA</text>
</svg>
